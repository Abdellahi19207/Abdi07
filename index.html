<!DOCTYPE html>
<html lang="ar" dir="auto">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abdellahi Med Salem Abdy - Statisticien</title>
   
    <style>
        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(rgba(0, 0, 0, 0.3), rgba(0, 0, 0, 0.3)),
                        url('https://i.postimg.cc/44PXSRQz/3880570626bcccd813e91ac39fcaeb67.jpg') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #ffffff;
            text-align: center;
        }

        .lang-selector {
            position: absolute;
            top: 20px;
            left: 20px;
        }

        .lang-selector select {
            padding: 5px;
            border-radius: 5px;
            border: none;
            background: white;
            cursor: pointer;
        }

        .search-container {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 5px;
            z-index: 1000;
        }

        .search-container input {
            padding: 5px 10px;
            border-radius: 15px;
            border: none;
            outline: none;
            background: rgba(255, 255, 255, 0.8);
        }

        .search-container button {
            background: transparent;
            border: none;
            cursor: pointer;
            font-size: 18px;
            color: white;
        }

        .profile-card {
            background: transparent;
            box-shadow: none;
            padding: 2rem;
            text-align: center;
            width: 100%;
            max-width: 500px;
        }

        .name, .title {
            color: #ffffff;
            text-shadow: 0 0 10px rgba(0,0,0,0.5);
        }

        .button-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn {
            padding: 12px;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, background 0.3s;
            color: white;
        }

        .btn:hover { transform: scale(1.05); }

        .license { background: #4a90e2; }
        .bac { background: #50e3c2; }
        .work { background: #f5a623; }

        #btn-y1 { background: #ff7675; }
        #btn-y2 { background: #fdcb6e; }
        #btn-y3 { background: #00b894; }

        .sub-btn {
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            color: white;
            transition: transform 0.2s;
        }

        .sub-btn:hover {
            transform: scale(1.03);
        }

        .back-btn {
            background: #2d3436;
            color: #ffffff;
            margin-top: 20px;
            padding: 15px;
            border: 2px solid #ffffff;
            font-size: 1.1rem;
            font-weight: bold;
            text-transform: uppercase;
        }

        .back-btn:hover {
            background: #000000;
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <div class="lang-selector">
        <select id="lang-select" onchange="changeLanguage(this.value)">
            <option value="ar">العربية</option>
            <option value="fr">Français</option>
            <option value="en">English</option>
        </select>
    </div>

    <div class="search-container">
        <input type="text" placeholder="بحث...">
        <button>🔍</button>
    </div>

    <div class="profile-card">
        <h1 id="name" class="name">Abdellahi Med Salem Abdy</h1>
        <p id="title" class="title">Statisticien</p>
       
        <div id="main-buttons" class="button-group">
            <button id="btn-licence" class="btn license" onclick="showLicense()">Licence</button>
            <button id="btn-bac" class="btn bac">Bac</button>
            <button id="btn-work" class="btn work">Travail</button>
        </div>

        <div id="license-sub" class="button-group" style="display: none;">
            <button id="btn-y1" class="btn sub-btn">1ère année</button>
            <button id="btn-y2" class="btn sub-btn">2ème année</button>
            <button id="btn-y3" class="btn sub-btn">3ème année</button>
            <button id="btn-back" class="btn back-btn" onclick="goBack()">رجوع</button>
        </div>
    </div>

    <script>
        const translations = {
            ar: { name: "عبد الله محمد سالم عبدي", title: "إحصائي", licence: "ليسانس", bac: "بكالوريا", work: "العمل", back: "رجوع", y1: "السنة الأولى", y2: "السنة الثانية", y3: "السنة الثالثة" },
            fr: { name: "Abdellahi Med Salem Abdy", title: "Statisticien", licence: "Licence", bac: "Baccalauréat", work: "Travail", back: "Retour", y1: "1ère année", y2: "2ème année", y3: "3ème année" },
            en: { name: "Abdellahi Med Salem Abdy", title: "Statistician", licence: "Bachelor", bac: "High School", work: "Work", back: "Back", y1: "1st year", y2: "2nd year", y3: "3rd year" }
        };

        function changeLanguage(lang) {
            const t = translations[lang];
            const elements = {
                'name': t.name, 'title': t.title, 'btn-licence': t.licence,
                'btn-bac': t.bac, 'btn-work': t.work, 'btn-back': t.back,
                'btn-y1': t.y1, 'btn-y2': t.y2, 'btn-y3': t.y3
            };

            for (let id in elements) {
                let el = document.getElementById(id);
                if (el) {
                    el.innerText = elements[id];
                }
            }
        }

        function showLicense() {
            document.getElementById('main-buttons').style.display = 'none';
            document.getElementById('license-sub').style.display = 'flex';
        }

        function goBack() {
            document.getElementById('main-buttons').style.display = 'flex';
            document.getElementById('license-sub').style.display = 'none';
        }
    </script>

</body>
  </html>
